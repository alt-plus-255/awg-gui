name: awggui

services:
  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    container_name: awggui-caddy
    restart: unless-stopped
    ports:
      - "${PANEL_PORT:-8877}:80"
      - "${PANEL_HTTPS_PORT:-7443}:443"
    volumes:
      - /etc/awg-gui/Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/awg-gui/certs/panel:/certs:ro
    depends_on:
      - app
    networks:
      - awggui

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: awggui-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8877}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-awggui}
      DB_USERNAME: ${DB_USERNAME:-awggui}
      DB_PASSWORD: ${DB_PASSWORD}
      DOCKER_HOST: tcp://docker-proxy:2375
      PANEL_OPS_URL: http://panel-ops:8090
      PANEL_OPS_TOKEN: ${PANEL_OPS_TOKEN}
      CERTBOT_CONTAINER: awggui-certbot
      AWG_CONTAINER: awggui-awg
      AWG_CONFIG_DIR: /awg
      HOST_AWG_CONFIG_DIR: /var/lib/docker/volumes/awggui_awg_config/_data
      HOST_AWG_GUI_DIR: /host-awg-gui
      HOST_COMPOSE_DIR: /compose
      SERVER_ENDPOINT: ${SERVER_ENDPOINT:-auto}
      AWG_PORT: ${AWG_PORT:-51820}
      INTERNAL_SUBNET: ${INTERNAL_SUBNET:-10.66.66.0/24}
      PEER_DNS: ${PEER_DNS:-1.1.1.1}
      ALLOWED_IPS: ${ALLOWED_IPS:-0.0.0.0/0, ::/0}
      PERSISTENT_KEEPALIVE: ${PERSISTENT_KEEPALIVE:-25}
      PANEL_PORT: ${PANEL_PORT:-8877}
      PANEL_HTTPS_PORT: ${PANEL_HTTPS_PORT:-7443}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      TZ: ${TZ:-UTC}
    volumes:
      - app_storage:/var/www/html/storage
      - awg_config:/awg
      - /proc:/host/proc:ro
      - /etc/awg-gui:/host-awg-gui
      - .:/compose:ro
    depends_on:
      db:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
    networks:
      - awggui

  db:
    image: mariadb:latest
    container_name: awggui-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-awggui}
      MYSQL_USER: ${DB_USERNAME:-awggui}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ:-UTC}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - awggui

  awg:
    build:
      context: ./awg
      dockerfile: Dockerfile
    container_name: awggui-awg
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - awg_config:/config
    ports:
      - "51820-51839:51820-51839/udp"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.conf.all.route_localnet=1
    networks:
      - awggui

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: awggui-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      EXEC: 1
      POST: 1
      LOGS: 1
      CONTAINERS_CREATE: 0
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      BUILD: 0
      COMMIT: 0
      SWARM: 0
      SYSTEM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2375/_ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - awggui

  panel-ops:
    build:
      context: ./panel-ops
      dockerfile: Dockerfile
    container_name: awggui-panel-ops
    restart: unless-stopped
    environment:
      PANEL_OPS_TOKEN: ${PANEL_OPS_TOKEN}
      COMPOSE_PROJECT: awggui
      COMPOSE_FILE: /compose/docker-compose.yml
      COMPOSE_ENV_FILE: /compose/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/compose:ro
    networks:
      - awggui

  certbot:
    image: certbot/certbot:v3.0.0
    container_name: awggui-certbot
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep infinity"]
    volumes:
      - /etc/awg-gui/certs:/etc/letsencrypt
      - /etc/awg-gui/certbot/hooks:/hooks:ro
      - /etc/awg-gui/certbot/challenge:/challenge
    networks:
      - awggui

networks:
  awggui:
    name: awggui_net

volumes:
  db_data:
    name: awggui_db_data
  awg_config:
    name: awggui_awg_config
  app_storage:
    name: awggui_app_storage
